<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Core Media Members</title>
  <style>
    /* Loader styles */
    #loader-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:linear-gradient(180deg,#001217,#021421);z-index:99999;color:#cffff0}
    .spinner{width:72px;height:72px;border-radius:50%;border:8px solid rgba(255,255,255,0.08);border-top-color:#00ff9a;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-text{margin-top:12px;font-weight:800}

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg,  green 0%, maroon 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #333;
    }
    h1 {
      text-align: center;
      color: white;
      margin-bottom: 50px;
      font-size: 2.8rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }
    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
    }
    .card-content {
      padding: 24px;
      text-align: center;
    }
    .card h2 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      color: #333;
    }
    .card h3 {
      font-size: 1.1rem;
      color: #667eea;
      margin-bottom: 16px;
      font-weight: 500;
    }
    .card p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #555;
    }
    .placeholder-img {
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #999;
      font-weight: bold;
    }
    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <div id="loader-overlay" aria-hidden="false">
    <div class="spinner" role="img" aria-label="Loading"></div>
    <div class="loader-text">Loading...</div>

  <script>
    (function(){const overlay=document.getElementById('loader-overlay');const minMs=500;const start=Date.now();function hide(){const wait=Math.max(0,minMs-(Date.now()-start));setTimeout(()=>{if(!overlay) return;overlay.style.transition='opacity .4s ease';overlay.style.opacity='0';overlay.setAttribute('aria-hidden','true');setTimeout(()=>overlay.remove(),450);},wait);}if(document.readyState==='complete') hide(); else window.addEventListener('load', hide);} )();
  </script>

</html>
