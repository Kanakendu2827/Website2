<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariners Onside Official Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" 
          crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* Loading overlay */
        #loader-overlay{
            position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
            background:linear-gradient(180deg, #001217, #021421);z-index:99999;color:#cffff0;
        }
        .spinner{width:72px;height:72px;border-radius:50%;border:8px solid rgba(255,255,255,0.08);border-top-color:#00ff9a;animation:spin 1s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loader-text{margin-top:14px;font-weight:800;letter-spacing:0.6px}

        *{margin:0;padding:0;box-sizing:border-box;font-family:'Arial Black',Arial,sans-serif;}
        /* New vibrant background */
        body{
            background: radial-gradient(1200px 600px at 10% 10%, rgba(0,255,170,0.06), transparent 8%),
                        radial-gradient(1000px 500px at 90% 90%, rgba(0,136,255,0.06), transparent 10%),
                        linear-gradient(135deg,#021421 0%, #002b2f 45%, #06122a 100%);
            color:#eef8f2;
            line-height:1.6;
            background-attachment: fixed;
        }

        /* TOP SOCIAL BAR */
        .top-bar{
            background:linear-gradient(to bottom,#006400,#008000);
            padding:14px 0;
            text-align:center;
            font-weight:bold;
            font-size:16px;
        }
        .top-bar a{
            color:#fff;
            margin:0 18px;
            font-size:24px;
            text-decoration:none;
            transition:.3s;
        }
        .top-bar a:hover{color:#00ff00;transform:scale(1.3);}
        .top-bar span{margin-right:20px;}

        /* HEADER */
        header{
            background:#510400;
            padding:20px 0;
            text-align:center;
        }
        .logo-container{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }
        .logo{
            width:90px;height:90px;
            background:url('logo.jpg') center/contain no-repeat;
            border-radius:50%;
            box-shadow:0 0 20px rgba(0,255,0,0.6);
        }
        .title{
            font-size:42px;
            font-weight:900;
            letter-spacing:2px;
            text-shadow:0 0 5px rgba(255,255,255,.5),3px 3px 6px #000;
        }
        .title span{font-size:28px;display:block;margin-top:5px;}

        /* NAVIGATION */
        nav{
            background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.12));
            backdrop-filter: blur(6px);
            padding:18px 0;
            text-align:center;
            box-shadow: 0 6px 20px rgba(2,20,30,0.4) inset;
        }
        nav a{
            color:#fff;
            margin:0 28px;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;
            text-transform:uppercase;
            transition:.3s;
        }
        nav a:hover{color:#00ff00;text-shadow:0 0 12px #00ff00;}

        /* DROPDOWN */
        .dropdown{display:inline-block;position:relative;}
        .dropdown-toggle{
            display:inline-flex;align-items:center;gap:8px;color:#fff;text-decoration:none;padding:8px 0;cursor:pointer;
        }
        .dropdown-toggle i{transition:transform .3s;}
        .dropdown-content{
            display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);
            background:rgba(0,0,0,0.98);min-width:240px;border:3px solid #006400;border-radius:12px;
            box-shadow:0 0 40px rgba(0,255,0,0.7);z-index:1000;opacity:0;visibility:hidden;transition:all .35s;
        }
        .dropdown:hover .dropdown-content,
        .dropdown.active .dropdown-content{
            display:block;opacity:1;visibility:visible;
        }
        .dropdown:hover .dropdown-toggle i,
        .dropdown.active .dropdown-toggle i{transform:rotate(180deg);}
        .dropdown-content a{
            display:block;padding:16px 24px;color:#fff;text-decoration:none;
            border-bottom:1px solid rgba(0,255,0,0.3);transition:.3s;
        }
        .dropdown-content a:hover{background:#006400;padding-left:34px;}
        .dropdown-content a:last-child{border:none;}

        /* STORE HERO */
        .store-hero{
            background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75));
            padding:100px 100px;
            text-align:center;
            color:#fff;
            position: relative; /* Added for absolute positioning */
        }
        .store-hero h1{
            font-size:72px;
            letter-spacing:5px;
            text-shadow:0 0 20px #000;
            margin-bottom:20px;
            position: relative; /* Ensure it's above the logo */
            z-index: 2;
        }
        .store-hero p{
            font-size:22px;
            max-width:800px;
            margin:0 auto;
            opacity:0.9;
            position: relative; /* Ensure it's above the logo */
            z-index: 2;
        }
        .hero-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: auto; /* Adjust size as needed */
            height: 300px;
            opacity: 0.3; /* Make it subtle behind the text */
            z-index: 1;
            pointer-events: none; /* Prevent interaction */
        }

        /* PRODUCT GRID */
        .products-section{
            padding:80px 20px;
            max-width:1400px;
            margin:0 auto;
        }
        .section-title{
            text-align:center;
            font-size:48px;
            margin-bottom:60px;
            text-transform:uppercase;
            letter-spacing:3px;
            color:#00ff00;
            text-shadow:0 0 15px rgba(0,255,0,0.6);
        }
        .product-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
            gap:40px;
        }
        .product{
            background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
            border:1px solid rgba(0,255,170,0.12);
            border-radius:15px;
            overflow:hidden;
            text-align:center;
            transition:all .4s, transform .35s ease;
            box-shadow:0 8px 30px rgba(2,10,20,0.6);
            backdrop-filter: blur(4px);
        }
        .product:hover{
            transform:translateY(-10px) scale(1.01);
            box-shadow:0 30px 80px rgba(0,40,30,0.6);
            border-color:rgba(0,255,170,0.3);
        }
        .product img{
            display:block;
            width:100%;
            max-height:420px;
            min-height:300px;
            object-fit:cover;
            transition:.4s;
            background:#081b1d;
        }
        .product:hover img{transform:scale(1.08);}
        .product h3{
            font-size:24px;
            padding:20px 15px 10px;
            color:#00ff00;
        }
        .product .price{
            font-size:28px;
            font-weight:900;
            color:#fff;
            margin:10px 0;
        }
        .product .buy-btn{
            display:block;
            width:90%;
            margin:20px auto;
            padding:16px;
            background:#008631;
            color:#fff;
            font-size:20px;
            font-weight:900;
            border:none;
            border-radius:10px;
            cursor:pointer;
            transition:.3s;
            text-decoration: none; /* Added for link styling */
        }
        .product .buy-btn:hover{
            background:#00ff00;
            color:#000;
            transform:scale(1.05);
        }

        /* FOOTER */
        footer{
            background:#111;
            padding:40px 20px;
            text-align:center;
            border-top:3px solid #006400;
        }
        footer p{
            font-size:18px;
            opacity:0.8;
        }

        /* RESPONSIVE */
        @media (max-width:768px){
            .store-hero h1{font-size:48px;}
            .store-hero p{font-size:18px;}
            .section-title{font-size:36px;}
            .top-bar a{font-size:20px;margin:0 12px;}
            nav a{margin:0 14px;font-size:16px;}
            .dropdown-content{left:auto;right:0;transform:none;min-width:200px;}
            .hero-logo {width: 200px;} /* Smaller on mobile */
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loader-overlay" aria-hidden="false">
        <div class="spinner" role="img" aria-label="Loading"></div>
        <div class="loader-text">Loading store...</div>
    </div>
    <!-- TOP BAR -->
    <div class="top-bar">
        <span>FOLLOW US</span>
        <a href="https://www.facebook.com/share/17cesvqNoP/" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="https://twitter.com/MarinersOnside" target="_blank" aria-label="Twitter"><i class="fab fa-x-twitter"></i></a>
        <a href="https://www.instagram.com/marinersonsideofficial" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
    </div>

    <!-- HEADER -->
    <header>
        <div class="logo-container">
            <div class="logo"></div>
            <div class="title">
                MARINERS ONSIDE
                <span>OFFICIAL</span>
            </div>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <a href="index.html">Home</a>
        <a href="contact Us.html">Contact</a>
    </nav>


    <!-- PRODUCTS -->
    <section class="products-section">
        <h2 class="section-title">Featured Product</h2>
        <div class="product-grid" style="justify-items:center;">
            <!-- Only Home Jersey is available -->
            <div class="product" style="max-width:420px;">
                <div style="position:relative;">
                    <span style="position:absolute;left:12px;top:12px;background:#00ff00;color:#000;padding:6px 10px;border-radius:8px;font-weight:900;">AVAILABLE</span>
                    <img src="jj2.jpeg" alt="Home Jersey 2025">
                </div>
                <h3>Home Jersey 2025</h3>
                <p class="price">₹499</p>
                <a href="payment_updated.html" class="buy-btn">BUY NOW</a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer style="background:#111;padding:24px 20px;text-align:center;border-top:3px solid #006400;margin-top:40px;">
        <p style="font-size:16px;opacity:0.9;line-height:1.8;">&copy; 2026 Mariners Onside Official Store • All Rights Reserved • Passion Finds Its Home Created By • Kanakendu Das</p>
        <p style="margin-top:8px;opacity:0.8;">Follow us on social for restocks and drops.</p>
    </footer>

    <!-- Mobile Dropdown Script -->
    <script>
        const dropdown = document.getElementById('fiesta-dropdown');
        if (dropdown) {
            dropdown.addEventListener('click', function(e){
                if(window.innerWidth <= 768){
                    e.preventDefault();
                    this.classList.toggle('active');
                }
            });
        }
    </script>
    <script>
        (function(){
            const overlay = document.getElementById('loader-overlay');
            const minMs = 500; // ensure loader shows briefly
            const start = Date.now();
            function hideLoader(){
                const wait = Math.max(0, minMs - (Date.now() - start));
                setTimeout(()=>{
                    if(!overlay) return;
                    overlay.style.transition = 'opacity .4s ease';
                    overlay.style.opacity = '0';
                    overlay.setAttribute('aria-hidden','true');
                    setTimeout(()=> overlay.remove(), 450);
                }, wait);
            }
            if(document.readyState === 'complete') hideLoader();
            else window.addEventListener('load', hideLoader);
        })();
    </script>
  <script>
    document.addEventListener('contextmenu', function(event) {
      event.preventDefault();
      alert('Blocked by the organization');

    document.addEventListener('keydown', function(event) {
      if (event.key === 'F12' ||
          (event.ctrlKey && event.shiftKey && ['I','J','C'].includes(event.key.toUpperCase())) ||
          (event.ctrlKey && event.key.toUpperCase() === 'U')) {
        event.preventDefault();
        alert('Blocked by the organization');
      }
    });
  </script>
</body>
</html>
